<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keycloak - Landing</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      margin: 0.35rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
    .btn-secondary {
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: #e8e8e8; }
    .btn-danger {
      background: rgba(239,68,68,0.2);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.3); }
    #loading { color: #94a3b8; }
    #landing-segura { display: none; }
    #login-register { display: none; }
    .user-info { color: #94a3b8; font-size: 0.9rem; margin-top: 1rem; word-break: break-all; }
    .badge { display: inline-block; background: rgba(34,197,94,0.2); color: #4ade80; padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KEYCLOAK</h1>
    <p class="subtitle">Práctica Seguridad Informática – Registro y acceso con Keycloak</p>

    <div id="loading" class="card">Comprobando sesión...</div>

    <div id="login-register" class="card" style="display: none;">
      <p style="margin-bottom: 1rem;">Inicia sesión o regístrate para acceder a la landing.</p>
      <button type="button" class="btn btn-primary" id="btn-login">Iniciar sesión</button>
      <button type="button" class="btn btn-secondary" id="btn-register">Registrarse</button>
    </div>

    <div id="landing-segura" class="card" style="display: none;">
      <span class="badge">Acceso concedido</span>
      <h2 style="margin: 1rem 0 0.5rem;">Bienvenido</h2>
      <p class="user-info" id="user-info"></p>
      <p style="margin-top: 1.5rem;">
        <button type="button" class="btn btn-danger" id="btn-logout">Cerrar sesión</button>
      </p>
    </div>
  </div>

  <script src="/vendor/keycloak.js"></script>
  <script>
    const keycloak = new Keycloak({
      url: 'http://localhost:8080',
      realm: 'LaboratorioDev',
      clientId: 'landing-app'
    });

    function show(el) { el.style.display = 'block'; }
    function hide(el) { el.style.display = 'none'; }

    function mostrarLogin() {
      hide(document.getElementById('loading'));
      show(document.getElementById('login-register'));
    }

    function mostrarLanding() {
      hide(document.getElementById('loading'));
      hide(document.getElementById('login-register'));
      document.getElementById('user-info').textContent =
        keycloak.tokenParsed?.preferred_username
          ? 'Usuario: ' + keycloak.tokenParsed.preferred_username
          : 'Sesión activa';
      show(document.getElementById('landing-segura'));
    }

    // Si Keycloak tarda más de 8 s (no está corriendo o falla), mostramos login
    const timeout = setTimeout(() => {
      document.getElementById('loading').innerHTML =
        'Keycloak no respondió. Comprueba que esté en marcha en <a href="http://localhost:8080" target="_blank" rel="noopener" style="color:#60a5fa;">localhost:8080</a>. <br><br><button type="button" class="btn btn-primary" onclick="location.reload()">Reintentar</button>';
      setTimeout(() => mostrarLogin(), 100);
    }, 8000);

    keycloak.init({ onLoad: 'check-sso', checkLoginIframe: false })
      .then((authenticated) => {
        clearTimeout(timeout);
        if (authenticated) {
          mostrarLanding();
        } else {
          mostrarLogin();
        }
      })
      .catch(() => {
        clearTimeout(timeout);
        mostrarLogin();
      });

    document.getElementById('btn-login').addEventListener('click', () => {
      keycloak.login();
    });

    document.getElementById('btn-register').addEventListener('click', () => {
      keycloak.register();
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      keycloak.logout();
    });
  </script>
</body>
</html>
